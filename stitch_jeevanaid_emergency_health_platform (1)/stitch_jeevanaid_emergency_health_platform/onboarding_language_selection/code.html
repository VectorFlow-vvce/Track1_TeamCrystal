<!-- Script to handle Material Symbols weight logic -->
<script>
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            if (icon.getAttribute('data-weight') === 'fill') {
                icon.style.fontVariationSettings = "'FILL' 1";
            }
        });
    </script>
<script>
        const options = Array.from(document.querySelectorAll('.lang-option'));
        let selectedLang = localStorage.getItem('jeevanaid.lang') || 'hi';

        function applySelection() {
            options.forEach((option) => {
                const active = option.dataset.lang === selectedLang;
                option.classList.toggle('bg-white', !active);
                option.classList.toggle('bg-[#EEF4FF]', active);
                option.classList.toggle('border-transparent', !active);
                option.classList.toggle('border-[#4F8EF7]', active);
            });
        }

        options.forEach((option) => {
            option.addEventListener('click', () => {
                selectedLang = option.dataset.lang;
                localStorage.setItem('jeevanaid.lang', selectedLang);
                applySelection();
            });
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            localStorage.setItem('jeevanaid.lang', selectedLang);
            window.location.href = '../offline_emergency_home/code.html';
        });

        applySelection();
    </script>
