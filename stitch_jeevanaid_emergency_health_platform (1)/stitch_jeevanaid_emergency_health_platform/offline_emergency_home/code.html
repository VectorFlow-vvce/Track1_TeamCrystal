<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .emergency-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .ambient-card-shadow {
            box-shadow: 0px 10px 30px rgba(79, 142, 247, 0.08);
        }

<body class="bg-[#FAFBFD] font-body-md text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#FAFBFD] border-b border-[#E6EAF2] font-['Manrope'] antialiased flex justify-between items-center w-full px-6 py-4 fixed top-0 left-0 z-50">
<div class="flex items-center gap-3">
<span class="text-2xl font-bold tracking-tight text-[#4F8EF7]">JeevanAid</span>
</div>
<div class="flex items-center gap-2 bg-surface-container-highest px-3 py-1 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-[18px] text-secondary">wifi_off</span>
<span class="font-label-caps text-[12px] text-secondary">OFFLINE</span>
</div>
</header>
<main class="pt-24 px-container_padding">
<!-- Connectivity & Info Pill -->
<div class="flex justify-center mb-stack_gap">
<div class="bg-[#EEF4FF] text-[#4F8EF7] rounded-full px-5 py-2 flex items-center gap-2 border border-[#E6EAF2]">
<span class="material-symbols-outlined text-[20px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">offline_pin</span>
<span class="font-label-caps text-sm">Offline Emergency Guide Ready</span>
</div>
</div>
<!-- Hero Title -->
<div class="text-center mb-8">
<h1 class="font-h1 text-h1 text-on-surface mb-2">What happened?</h1>
<p class="font-body-md text-on-surface-variant">Tap the situation for immediate steps</p>
</div>
<!-- Emergency Icon Grid (3-column) -->
<div class="emergency-grid mb-10">
<!-- Snake Bite -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform" onclick="window.location.href='../first_aid_guide_snake_bite/code.html'">
<div class="w-14 h-14 rounded-2xl bg-orange-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-orange-600 text-3xl">dangerous</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Snake Bite</span>
</button>
<!-- Seizure -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-purple-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-purple-600 text-3xl">psychology</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Seizure</span>
</button>
<!-- Choking -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-blue-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-blue-600 text-3xl">air</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Choking</span>
</button>
<!-- Burns -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-red-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-red-600 text-3xl">local_fire_department</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Burns</span>
</button>
<!-- Heart Attack -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-rose-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-rose-600 text-3xl">heart_broken</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Heart Attack</span>
</button>
<!-- Drowning -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-cyan-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-cyan-600 text-3xl">waves</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Drowning</span>
</button>
<!-- Fracture -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-slate-600 text-3xl">skeleton</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Fracture</span>
</button>
<!-- Bleeding -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-red-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-red-700 text-3xl">blood_pressure</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Bleeding</span>
</button>
<!-- Unconscious -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-indigo-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-indigo-600 text-3xl">bed</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Unconscious</span>
</button>
<!-- Electric Shock -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-yellow-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-yellow-600 text-3xl">bolt</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Electric Shock</span>
</button>
<!-- Heat Stroke -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-orange-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-orange-700 text-3xl">device_thermostat</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Heat Stroke</span>
</button>
<!-- Allergic Reaction -->
<button class="bg-white rounded-[20px] p-4 flex flex-col items-center justify-center ambient-card-shadow border border-[#E6EAF2] active:scale-95 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-green-100 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-green-600 text-3xl">eco</span>
</div>
<span class="font-label-caps text-[13px] text-center leading-tight">Allergic Reaction</span>
</button>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-2 gap-4 mb-20">
<button class="h-14 bg-[#EEF4FF] text-[#4F8EF7] rounded-xl flex items-center justify-center gap-2 font-action active:opacity-80" onclick="window.location.href='../ai_symptom_checker/code.html'">
<span class="material-symbols-outlined">clinical_notes</span>
                Symptom Checker
            </button>
<button class="h-14 bg-primary text-white rounded-xl flex items-center justify-center gap-2 font-action active:opacity-80 shadow-lg" onclick="window.location.href='../nearest_clinic/code.html'">
<span class="material-symbols-outlined">local_hospital</span>
                Nearest Clinic
            </button>
</div>

<div class="flex flex-col items-center justify-center text-[#4F8EF7] bg-[#EEF4FF] rounded-xl px-4 py-1 cursor-pointer" onclick="window.location.href='../offline_emergency_home/code.html'">

<footer class="fixed bottom-0 left-0 w-full z-50 h-[56px] flex items-center justify-center bg-[#F26D6D] text-white font-['Lexend'] font-bold text-xl uppercase tracking-widest shadow-lg hover:bg-red-600 transition-all active:scale-90 duration-75 cursor-pointer">
<a href="tel:108">CALL 108 - EMERGENCY</a>
    </footer>
<script>
        document.querySelectorAll('.emergency-grid button').forEach((button) => {
            button.addEventListener('click', () => {
                window.location.href = '../first_aid_guide_snake_bite/code.html';
            });
        });
    </script>
